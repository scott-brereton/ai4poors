name: Ai4Poors
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.12.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Ai4Poors:
    type: application
    platform: iOS
    sources:
      - path: Ai4Poors
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors
        INFOPLIST_FILE: Ai4Poors/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4Poors/Ai4Poors.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Ai4Poors
    dependencies:
      - target: Ai4PoorsKeyboard
      - target: Ai4PoorsSafari
      - target: Ai4PoorsWidgets
      - target: Ai4PoorsShareExtension
      - target: Ai4PoorsBroadcast
      - package: WhisperKit

  Ai4PoorsKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Ai4PoorsKeyboard
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.keyboard
        INFOPLIST_FILE: Ai4PoorsKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsKeyboard/Ai4PoorsKeyboard.entitlements
        PRODUCT_NAME: Ai4PoorsKeyboard

  Ai4PoorsSafari:
    type: app-extension
    platform: iOS
    sources:
      - path: Ai4PoorsSafari
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.safari
        INFOPLIST_FILE: Ai4PoorsSafari/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsSafari/Ai4PoorsSafari.entitlements
        PRODUCT_NAME: Ai4PoorsSafari

  Ai4PoorsWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Ai4PoorsWidgets
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.widgets
        INFOPLIST_FILE: Ai4PoorsWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsWidgets/Ai4PoorsWidgets.entitlements
        PRODUCT_NAME: Ai4PoorsWidgets

  Ai4PoorsShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Ai4PoorsShareExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.share
        INFOPLIST_FILE: Ai4PoorsShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsShareExtension/Ai4PoorsShareExtension.entitlements
        PRODUCT_NAME: Ai4PoorsShareExtension

  Ai4PoorsBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: Ai4PoorsBroadcast
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.broadcast
        INFOPLIST_FILE: Ai4PoorsBroadcast/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsBroadcast/Ai4PoorsBroadcast.entitlements
        PRODUCT_NAME: Ai4PoorsBroadcast

  Ai4PoorsMac:
    type: application
    platform: macOS
    sources:
      - path: Ai4PoorsMac
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ai4poors.mac
        INFOPLIST_FILE: Ai4PoorsMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ai4PoorsMac/Ai4PoorsMac.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Ai4PoorsMac
